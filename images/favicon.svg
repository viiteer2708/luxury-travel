<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="globe" cx="40%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#f5e0c8"/>
      <stop offset="45%" stop-color="#e8c4a0"/>
      <stop offset="100%" stop-color="#d4a87a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <!-- Anillo dorado exterior -->
  <circle cx="30" cy="34" r="27" fill="none" stroke="#c9a96e" stroke-width="1.2" opacity="0.6"/>

  <!-- Esfera del mundo -->
  <circle cx="30" cy="34" r="24" fill="url(#globe)"/>

  <!-- Continentes simplificados (América) -->
  <path d="M22 18 Q20 22 19 26 Q18 30 20 34 Q21 37 20 40 Q19 43 21 46 Q22 48 24 50 Q25 48 24 45 Q23 42 24 39 Q25 36 24 33 Q23 29 24 25 Q25 21 23 18Z" fill="#d4a87a" opacity="0.5"/>
  <path d="M27 20 Q29 22 28 25 Q27 28 28 31 Q29 33 28 35 Q27 37 28 39 Q30 38 29 35 Q28 32 30 29 Q32 26 30 22 Q28 19 27 20Z" fill="#d4a87a" opacity="0.4"/>

  <!-- Europa/Africa hints -->
  <path d="M36 24 Q38 26 39 29 Q40 32 38 35 Q37 38 38 41 Q39 43 37 45 Q36 43 37 40 Q38 37 37 34 Q36 31 37 28 Q38 25 36 24Z" fill="#d4a87a" opacity="0.4"/>

  <!-- Brillo especular -->
  <ellipse cx="24" cy="26" rx="6" ry="8" fill="white" opacity="0.15"/>

  <!-- Aviones -->
  <!-- Avión 1 (grande, arriba) -->
  <g transform="translate(44, 12) rotate(-35)">
    <path d="M0 0 L-3 1.5 L-8 1 L-3 0 L-8 -1 L-3 -1.5Z" fill="#c9a96e"/>
    <path d="M-5.5 0 L-6.5 1.2 L-7.5 1 L-6 0 L-7.5 -1 L-6.5 -1.2Z" fill="#c9a96e"/>
  </g>

  <!-- Avión 2 (medio) -->
  <g transform="translate(50, 24) rotate(-35)">
    <path d="M0 0 L-2.2 1.1 L-6 0.7 L-2.2 0 L-6 -0.7 L-2.2 -1.1Z" fill="#c9a96e" opacity="0.8"/>
    <path d="M-4 0 L-4.8 0.9 L-5.5 0.7 L-4.4 0 L-5.5 -0.7 L-4.8 -0.9Z" fill="#c9a96e" opacity="0.8"/>
  </g>

  <!-- Avión 3 (pequeño, abajo) -->
  <g transform="translate(36, 6) rotate(-35)">
    <path d="M0 0 L-1.8 0.9 L-5 0.6 L-1.8 0 L-5 -0.6 L-1.8 -0.9Z" fill="#c9a96e" opacity="0.6"/>
  </g>

  <!-- Estela de los aviones -->
  <line x1="10" y1="48" x2="44" y2="12" stroke="#c9a96e" stroke-width="0.4" opacity="0.3" stroke-dasharray="2 3"/>
  <line x1="16" y1="52" x2="50" y2="24" stroke="#c9a96e" stroke-width="0.4" opacity="0.25" stroke-dasharray="2 3"/>

  <!-- Destellos dorados -->
  <circle cx="18" cy="54" r="1" fill="#c9a96e" opacity="0.6"/>
  <circle cx="22" cy="56" r="0.7" fill="#c9a96e" opacity="0.5"/>
  <circle cx="26" cy="57" r="0.8" fill="#c9a96e" opacity="0.4"/>
  <circle cx="30" cy="56" r="0.5" fill="#c9a96e" opacity="0.5"/>
  <circle cx="15" cy="52" r="0.5" fill="#c9a96e" opacity="0.4"/>
  <circle cx="34" cy="55" r="0.6" fill="#c9a96e" opacity="0.3"/>
</svg>
